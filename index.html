function procArray(p){
  // Normaliza para array de objetos {nome, via}. Aceita legado: string ou array de strings.
  if(!p)return[];
  const arr=Array.isArray(p)?p:[p];
  return arr.map(x=>typeof x==='string'?{nome:x,via:'convencional'}:{nome:x.nome,via:x.via||'convencional'});
}
function procLabel(p,outraDesc){
  if(!p)return'';
  return procArray(p).map(x=>x.nome==='Outra'&&outraDesc?'Outra: '+outraDesc:x.nome).join(' + ');
}
function procVia(p){
  // Via dominante (do primeiro procedimento) para colorir a cirurgia
  const a=procArray(p);
  return a.length?a[0].via:null;
}
function procNames(p){return procArray(p).map(x=>x.nome);}

const AVISOS_BASE={

  'Prostatectomia radical':{pos:'Trendelenburg',anes:'Geral',dur:'2h30–4h',mat:[{id:'1',d:'Kit laparoscopia (trocárteres)',q:1,u:'kit'},{id:'2',d:'Câmera laparoscópica HD 10mm',q:1,u:'unidade'},{id:'3',d:'Grampeador linear EndoGIA',q:2,u:'unidade'},{id:'4',d:'Ligasure 5mm',q:1,u:'unidade'},{id:'5',d:'Fio absorvível 3-0 anastomose',q:4,u:'unidade'},{id:'6',d:'Sonda Foley 18 Fr',q:1,u:'unidade'},{id:'7',d:'Dreno Jackson-Pratt',q:1,u:'unidade'},{id:'8',d:'Endobag',q:1,u:'unidade'}],obs:'Reservar 2 CH O+. Cefalotina 2g EV 30 min antes.'},
  'Nefrectomia radical':{pos:'Lateral (flanco)',anes:'Geral',dur:'2h–3h',mat:[{id:'1',d:'Kit laparoscopia/trocárteres',q:1,u:'kit'},{id:'2',d:'Grampeador vascular EndoGIA 45mm',q:2,u:'unidade'},{id:'3',d:'Ligasure 5mm',q:1,u:'unidade'},{id:'4',d:'Endobag 15mm',q:1,u:'unidade'},{id:'5',d:'Dreno sucção 15 Fr',q:1,u:'unidade'}],obs:'TC abdome recente. Reservar 2 CH. Coxim sob lombar.'},
  'Cistectomia radical (masculina)':{pos:'Trendelenburg/supino',anes:'Geral + peridural',dur:'4h–6h',mat:[{id:'1',d:'Kit laparotomia/laparoscopia',q:1,u:'kit'},{id:'2',d:'Grampeador linear 75mm',q:3,u:'unidade'},{id:'3',d:'Fio absorvível 2-0 anastomose intestinal',q:6,u:'unidade'},{id:'4',d:'Cateter ureteral duplo J 6 Fr',q:2,u:'unidade'},{id:'5',d:'Kit bolsa urostomia',q:1,u:'kit'},{id:'6',d:'Concentrado de hemácias O+',q:4,u:'CH'}],obs:'Preparo intestinal no dia anterior. Consentimento obrigatório.'},

function newAviso(procs){
  const arr=procNames(procs);
  if(arr.length===0)return{pos:'',anes:'',dur:'',mat:[],obs:''};
  // Map procedure names to aviso keys
  const MAP={
    'RTU bexiga':'RTU bexiga',
    'Prostatectomia radical':'Prostatectomia radical',
    'Nefrectomia radical':'Nefrectomia radical',
    'Cistoprostatectomia radical (homem)':'Cistectomia radical (masculina)',
    'Cistectomia radical (mulher)':'Cistectomia radical (masculina)',
  };
  // Collect all matching avisos
  const matched=arr.map(p=>AVISOS_BASE[p]||AVISOS_BASE[MAP[p]]).filter(Boolean);
  if(matched.length===0)return{pos:'',anes:'',dur:'',mat:[],obs:''};
  if(matched.length===1)return JSON.parse(JSON.stringify(matched[0]));
  // Merge: combine all materials (deduplicate by description), merge obs
  const mergedMat=[];const seen=new Set();
  matched.forEach(a=>(a.mat||[]).forEach(m=>{
    const key=m.d.toLowerCase().trim();
    if(!seen.has(key)){seen.add(key);mergedMat.push(JSON.parse(JSON.stringify(m)));}
  }));
  return{
    pos:matched.map(a=>a.pos).filter(Boolean).join(' / '),
    anes:matched.map(a=>a.anes).filter(Boolean).join(' / '),
    dur:matched[0].dur||'',
    mat:mergedMat,
    obs:matched.map(a=>a.obs).filter(Boolean).join('\n'),
  };
}

function todayStr(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`}
function dStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function fmt(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`}
function calcAge(dob){if(!dob)return'';const b=new Date(dob),t=new Date();let a=t.getFullYear()-b.getFullYear();if(t<new Date(t.getFullYear(),b.getMonth(),b.getDate()))a--;return`${a} anos`}
function daysBetween(a,b){
  // dias de a até b (datas 'YYYY-MM-DD'); positivo se b é depois de a
  const da=new Date(a+'T00:00:00'),db=new Date(b+'T00:00:00');
  return Math.round((db-da)/86400000);
}
function prazoInfo(p){
  // Retorna info do prazo (data limite) para pacientes ainda não realizados/cancelados
  if(!p||!p.prazo)return null;
  if(p.status==='realizado'||p.status==='cancelado')return null;
  const dias=daysBetween(todayStr(),p.prazo);
  let nivel,col,bg,label;
  if(dias<0){nivel='vencido';col='#A32D2D';bg='#FCEBEB';label='Vencido há '+Math.abs(dias)+' dia(s)';}
  else if(dias===0){nivel='hoje';col='#A32D2D';bg='#FCEBEB';label='Vence hoje';}
  else if(dias<=7){nivel='critico';col='#A32D2D';bg='#FCEBEB';label=dias+' dia(s) restante(s)';}
  else if(dias<=21){nivel='alerta';col='#854F0B';bg='#FAEEDA';label=dias+' dia(s) restante(s)';}
  else if(dias<=45){nivel='atencao';col='#92710B';bg='#FBF3D6';label=dias+' dia(s) restante(s)';}
  else{nivel='ok';col='#3B6D11';bg='#EAF3DE';label=dias+' dia(s) restante(s)';}
  return{dias,nivel,col,bg,label,data:p.prazo};
}
function addMin(hhmm,mn){const[hh,m]=hhmm.split(':').map(Number);const tt=hh*60+m+mn;return`${String(Math.floor(tt/60)).padStart(2,'0')}:${String(tt%60).padStart(2,'0')}`}
function salaById(week,id){return Object.values(week).flatMap(d=>d.salas).find(s=>s.id===id)}
function tipoCir(week,p){const s=salaById(week,p.sala);return s?s.tipo:null}
function sundayKey(ds){
  // Retorna a data (YYYY-MM-DD) do domingo da semana que contém ds
  if(!ds)return'';
  const d=new Date(ds+'T00:00:00');d.setDate(d.getDate()-d.getDay());
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function weekFor(ds,baseWeek,overrides){
  // Configuração efetiva da semana que contém ds (override por semana ou modelo padrão)
  if(!ds)return baseWeek;
  const k=sundayKey(ds);
  return(overrides&&overrides[k])?overrides[k]:baseWeek;
}
function resolveWeek(ds,weekOrResolver){
  return typeof weekOrResolver==='function'?weekOrResolver(ds):weekOrResolver;
}
function genSlots(ds,patients,weekOrResolver){
  const week=resolveWeek(ds,weekOrResolver);
  const dow=new Date(ds).getDay(),wc=week[dow];
  if(!wc||!wc.ativa||FERIADOS[ds])return[];
  const out=[];
  wc.ass.forEach(a=>{
    wc.salas.filter(s=>a.salas.includes(s.id)&&s.ativa).forEach(sala=>{
      const ocup=patients.filter(p=>p.dataCir===ds&&p.sala===sala.id&&p.status==='agendado').map(p=>p.hora);
      let hora=a.ini||'07:00';
      for(let i=0;i<a.max;i++){out.push({sala,ass:a,hora,livre:!ocup.includes(hora)});hora=addMin(hora,a.dur||90)}
    });
  });
  return out;
}

// ── FIREBASE HOOKS ──
function useFirebase(){
  const [ready,setReady]=useState(!!window._db);
  useEffect(()=>{
    if(window._db){setReady(true);return}
    function f(){setReady(true)}
    window.addEventListener('firebase-ready',f);
    return()=>window.removeEventListener('firebase-ready',f);
  },[]);
  return ready;
}

function usePatients(ready){
  const [patients,setPatients]=useState([]);
  const [loaded,setLoaded]=useState(false);
  useEffect(()=>{
    if(!ready)return;

function useWeekConfig(ready){
  const [week,setWeek]=useState(WEEK_INIT);
  useEffect(()=>{
    if(!ready)return;
    const {doc,onSnapshot}=window._fb;
    const unsub=onSnapshot(doc(window._db,'config','week'),(snap)=>{
      if(snap.exists()){

      }
    });
    return unsub;
  },[ready]);
  return week;
}

function useWeekOverrides(ready){
  const [overrides,setOverrides]=useState({});
  useEffect(()=>{
    if(!ready)return;
    const {doc,onSnapshot}=window._fb;
    const unsub=onSnapshot(doc(window._db,'config','weekOverrides'),(snap)=>{
      if(snap.exists()){try{const d=snap.data();if(d&&d.overrides)setOverrides(JSON.parse(d.overrides));}catch(e){}}

async function saveFavorito(fav){

function useFavoritos(ready){
  const [favs,setFavs]=useState([]);
  const [loaded,setLoaded]=useState(false);
  useEffect(()=>{
    if(!ready)return;
    const {collection,onSnapshot}=window._fb;
    const unsub=onSnapshot(collection(window._db,'favoritos'),(snap)=>{
      const fs=[];snap.forEach(d=>fs.push({id:d.id,...d.data()}));
      // Auto-seed favorites pré-definidos se ainda não existirem
      const seeds=[FAV_RTU_BEXIGA,FAV_RTU_PROSTATA,FAV_URETEROSCOPIA_FLEXIVEL,FAV_URETEROSCOPIA_SEMIRRIGIDA,FAV_URETROPLASTIA,FAV_URETROTOMIA_INTERNA,FAV_NEFROSTOMIA,FAV_CISTECTOMIA_RADICAL_ROBOTICA,FAV_NEFRECTOMIA_PARCIAL_ROBOTICA,FAV_PROSTATECTOMIA_RADICAL_ROBOTICA2,FAV_PROSTATECTOMIA_TRANSVESICAL_ROBOTICA,FAV_LINFADENECTOMIA_RETROPERITONEAL_ROBOTICA,FAV_PROSTATECTOMIA_ROBOTICA,FAV_ADRENALECTOMIA_ABERTA,FAV_ADRENALECTOMIA_VLP,FAV_CISTECTOMIA_RADICAL_ABERTA,FAV_CISTOSCOPIA,FAV_DOENCA_PEYRONIE,FAV_HIDROCELECTOMIA,FAV_PROTESE_PENIANA,FAV_LINFADENECTOMIA_INGUINAL_ABERTA,FAV_LINFADENECTOMIA_INGUINAL_VLP,FAV_LINFADENECTOMIA_RETROPERITONEAL_ABERTA,FAV_NEFRECTOMIA_ABERTA,FAV_NEFRECTOMIA_PARCIAL_VLP,FAV_NEFRECTOMIA_RADICAL_VLP,FAV_NEFROLITOTRIPSIA_PERCUTANEA,FAV_ORQUIECTOMIA_RADICAL,FAV_PENECTOMIA_PARCIAL,FAV_PENECTOMIA_TOTAL,FAV_PROSTATECTOMIA_TRANSVESICAL,FAV_PROSTATECTOMIA_RADICAL_ABERTA,FAV_PROSTATECTOMIA_RADICAL_VLP];
      seeds.forEach(seed=>{
        if(!fs.find(f=>f.id===seed.id)){saveFavorito(seed);}
      });
      fs.sort((a,b)=>a.nome.localeCompare(b.nome));
      setFavs(fs);setLoaded(true);
    });
    return unsub;
  },[ready]);
  return{favs,loaded};
}

// ── APP ROOT ──
function App(){
  const fbReady=useFirebase();
  const {patients,loaded}=usePatients(fbReady);
  const weekFromDb=useWeekConfig(fbReady);
  const overridesFromDb=useWeekOverrides(fbReady);
  const {favs,loaded:favsLoaded}=useFavoritos(fbReady);
  const [week,setWeek]=useState(WEEK_INIT);
  const [overrides,setOverrides]=useState({});
  useEffect(()=>{setWeek(weekFromDb)},[weekFromDb]);
  useEffect(()=>{setOverrides(overridesFromDb||{})},[overridesFromDb]);
  const getWeek=useMemo(()=>(ds)=>weekFor(ds,week,overrides),[week,overrides]);

  const [view,setView]=useState('dashboard');
  const [tab,setTab]=useState('oncologia');
  const [fStatus,setFStatus]=useState('todos');
  const [fProc,setFProc]=useState('todos');
  const [busca,setBusca]=useState('');
  const [calMes,setCalMes]=useState(new Date().getMonth());
  const [calAno,setCalAno]=useState(new Date().getFullYear());
  const [repMes,setRepMes]=useState(new Date().getMonth());
  const [repAno,setRepAno]=useState(new Date().getFullYear());
  const [selDate,setSelDate]=useState(null);
  const [agendando,setAgendando]=useState(null);
  const [modalPac,setModalPac]=useState(false);
  const [editPac,setEditPac]=useState(null);
  const [modalAviso,setModalAviso]=useState(false);
  const [avisoPac,setAvisoPac]=useState(null);
  const [toast,setToast]=useState(null);

  useEffect(()=>{if(toast){const t=setTimeout(()=>setToast(null),4500);return()=>clearTimeout(t)}},[toast]);
  const showToast=msg=>setToast(msg);

  const handleStatus=async(p,s)=>{
    if(s==='agendado'){setAgendando(p);setView('calendar');setCalMes(new Date().getMonth());setCalAno(new Date().getFullYear());return;}
    const clr=s==='pendente'||s==='cancelado';
    const updated={...p,status:s,hist:[...(p.hist||[]),{d:todayStr(),de:p.status,para:s}],dataCir:clr?'':p.dataCir,sala:clr?'':p.sala,hora:clr?'':p.hora,assId:clr?'':p.assId,assNome:clr?'':p.assNome};
    await savePaciente(updated);
  };
  const handleSavePac=async(f)=>{
    const isNew=!f.id;
    // Validação de prontuário único
    if(f.prontuario&&f.prontuario.trim()!==''){
      const dup=patients.find(p=>p.prontuario.trim()===f.prontuario.trim()&&p.id!==f.id);
      if(dup){
        setModalPac(false);setEditPac(null);
        const catLabel=dup.cat==='oncologia'?'Oncologia':'RTU de bexiga';
        const statusLabel=SL[dup.status]||dup.status;
        setTimeout(()=>{
          if(window.confirm(`⚠️ Paciente já cadastrado!\n\nNome: ${dup.nome}\nProntuário: ${dup.prontuario}\nCategoria: ${catLabel}\nStatus: ${statusLabel}${dup.dataCir?' · '+fmt(dup.dataCir):''}\n\nDeseja ir para onde este paciente está alocado?`)){
            setTab(dup.cat);
            setView('patients');
            setFStatus('todos');
            setBusca(dup.prontuario);
          }
        },100);
        return;
      }
    }
    // Normalize: migrate legacy proc string to procs array
    const procsArr=procArray(f.procs||f.proc);
    // Regenerate aviso if procs changed
    const prevPac=patients.find(px=>px.id===f.id);
    const procsChanged=!prevPac||JSON.stringify(procArray(prevPac.procs||prevPac.proc))!==JSON.stringify(procsArr);
    const finalAviso=procsChanged&&!f.aviso?newAviso(procsArr):f.aviso||newAviso(procsArr);
    const hasOutra=procsArr.some(x=>x.nome==='Outra');
    const p={...f,id:f.id||'p'+Date.now(),incl:f.incl||todayStr(),assId:f.assId||'',assNome:f.assNome||'',procs:procsArr,proc:procsArr[0]?procsArr[0].nome:'',outraDesc:hasOutra?(f.outraDesc||''):'',hist:f.hist||[{d:todayStr(),de:null,para:'pendente'}],aviso:finalAviso};
    await savePaciente(p);setModalPac(false);setEditPac(null);
    showToast(isNew?`${p.nome} adicionado.`:`${p.nome} atualizado.`);
  };
  const handleDeletePac=async(id)=>{await deletePaciente(id);showToast('Paciente removido.')};
  const handleSaveAviso=async(av)=>{
    const updated={...avisoPac,aviso:av};
    await savePaciente(updated);setModalAviso(false);setAvisoPac(null);
    showToast('Aviso cirúrgico salvo.');
  };
  const handleConfirmAg=async(pac,agDate,agSlot)=>{
    const updated={...pac,status:'agendado',dataCir:agDate,sala:agSlot.sala.id,assId:agSlot.ass.id,assNome:agSlot.ass.nome,hora:agSlot.hora,hist:[...(pac.hist||[]),{d:todayStr(),de:pac.status,para:'agendado'}]};
    await savePaciente(updated);setAgendando(null);setView('patients');
    showToast(`${pac.nome} agendado para ${fmt(agDate)} às ${agSlot.hora}`);
  };

  const nav=[
    {id:'dashboard',icon:'ti-layout-dashboard',label:'Painel'},
    {id:'patients',icon:'ti-users',label:'Pacientes'},
    {id:'calendar',icon:'ti-calendar',label:'Calendário'},
    {id:'relatorio',icon:'ti-report-medical',label:'Relatório'},
    {id:'favoritos',icon:'ti-star',label:'Favoritos'},
    {id:'config',icon:'ti-settings',label:'Configurar'},
  ];

  if(!fbReady||!loaded||!favsLoaded)return h('div',{className:'loader'},h('div',{className:'spinner'}),h('p',{style:{fontSize:14,color:'var(--text-secondary)',fontWeight:500}},'Conectando ao banco de dados...'));

  return h('div',{style:{minHeight:'100vh',display:'flex',flexDirection:'column'}},
    toast&&h('div',{className:'toast'},h('i',{className:'ti ti-circle-check',style:{color:'#3B6D11',fontSize:22,flexShrink:0}}),h('p',{style:{fontSize:13,color:'#27500A',fontWeight:500}},toast)),
    h('header',null,
      h('div',{style:{display:'flex',alignItems:'center',gap:10}},
        h('div',{style:{width:32,height:32,borderRadius:8,background:'#185FA5',display:'flex',alignItems:'center',justifyContent:'center'}},h('i',{className:'ti ti-stethoscope',style:{color:'#fff',fontSize:16}})),
        h('div',null,
          h('div',{style:{display:'flex',alignItems:'center',gap:7}},h('p',{style:{fontSize:14,fontWeight:500}},'Cirurgias Urológicas – HMVSC'),h('span',{className:'sync-dot',title:'Sincronizado em tempo real'})),
          h('p',{style:{fontSize:11,color:'var(--text-secondary)'}},'Sincronizado em tempo real · Município de São Paulo'))),
      h('nav',{style:{display:'flex',gap:3,flexWrap:'wrap'}},nav.map(n=>h('button',{key:n.id,onClick:()=>setView(n.id),className:`nav-btn${view===n.id?' active':''}`,style:{position:'relative'}},
        h('i',{className:`ti ${n.icon}`,style:{fontSize:14}}),n.label,
        n.id==='calendar'&&agendando&&h('span',{style:{position:'absolute',top:4,right:4,width:7,height:7,borderRadius:'50%',background:'#185FA5',border:'2px solid var(--bg-primary)'}}),
        n.id==='favoritos'&&favs.length>0&&h('span',{style:{position:'absolute',top:4,right:4,background:'#854F0B',color:'#fff',borderRadius:'10px',fontSize:9,padding:'1px 5px',fontWeight:600}},favs.length)
      )))
    ),
    h('main',null,
      view==='dashboard'?h(Dashboard,{patients,week,getWeek,dispatch:({view:v,tab:t})=>{if(v)setView(v);if(t){setTab(t);setView('patients');}}}):
      view==='patients'?h(PacView,{patients,week,getWeek,tab,fStatus,fProc,busca,dispatch:({tab:t,fStatus:fs,fProc:fpr,busca:b})=>{if(t){setTab(t);setFProc('todos');}if(fs!==undefined)setFStatus(fs);if(fpr!==undefined)setFProc(fpr);if(b!==undefined)setBusca(b)},onStatus:handleStatus,onEdit:(p)=>{setEditPac(p);setModalPac(true)},onDelete:handleDeletePac,onAviso:(p)=>{setAvisoPac(p);setModalAviso(true)}}):
      view==='calendar'?h(CalView,{patients,week,getWeek,agendando,setAgendando,calMes,calAno,setCalMes,setCalAno,selDate,setSelDate,onConfirmAg:handleConfirmAg}):
      view==='relatorio'?h(RelView,{patients,week,getWeek,repMes,repAno,setRepMes,setRepAno}):
      view==='favoritos'?h(FavoritosView,{favs,onToast:showToast}):
      h(ConfigView,{week,setWeek,overrides,setOverrides})
    ),
    modalPac&&h(PacModal,{pac:editPac,defCat:tab,patients,onSave:handleSavePac,onClose:()=>{setModalPac(false);setEditPac(null)}}),
    modalAviso&&avisoPac&&h(AvisoModal,{pac:avisoPac,favs,onSave:handleSaveAviso,onClose:()=>{setModalAviso(false);setAvisoPac(null)}})
  );
}

const domNode = document.getElementById('app');
const root = ReactDOM.createRoot(domNode);
root.render(React.createElement(App));
</script>
