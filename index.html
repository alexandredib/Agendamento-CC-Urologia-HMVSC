<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:13px}
:root{
  --bg-primary:#fff;--bg-secondary:#f5f4f0;--bg-tertiary:#f0ede8;
  --text-primary:#1a1a1a;--text-secondary:#666;--text-tertiary:#aaa;

  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-dark:#0C447C;

  --red:#A32D2D;--red-bg:#FCEBEB;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --pink:#993556;--pink-bg:#FBEAF0;
  --gray:#5F5E5A;--gray-bg:#F1EFE8;
  --radius:8px;--radius-lg:12px;
}
.ifield{border:0.5px solid var(--border-medium);border-radius:var(--radius);padding:7px 10px;font-size:13px;background:var(--bg-primary);color:var(--text-primary);outline:none;width:100%}
.ifield:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,95,165,0.12)}
.pbtn{background:var(--blue);color:#fff;border:none;border-radius:var(--radius);padding:8px 16px;font-weight:500;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s}
.pbtn:hover{opacity:.9}
.obtn{background:none;border:0.5px solid var(--border-medium);border-radius:var(--radius);padding:8px 16px;color:var(--text-primary);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.obtn:hover{background:var(--bg-secondary)}
.card{background:var(--bg-primary);border-radius:var(--radius-lg);border:0.5px solid var(--border-light);overflow:visible}
.tag{display:inline-flex;align-items:center;gap:4px;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:500;white-space:nowrap}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.48);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.mbox{background:var(--bg-primary);border-radius:var(--radius-lg);width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.18)}
.mh{padding:14px 20px;border-bottom:0.5px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg-primary);z-index:10}
.ib{background:none;border:0.5px solid var(--border-light);border-radius:var(--radius);padding:5px 8px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;color:var(--text-primary)}
.ib:hover{background:var(--bg-secondary)}
.nav-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border:none;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:500;background:none;color:var(--text-secondary);transition:all .15s;position:relative}
.nav-btn:hover{background:var(--bg-secondary);color:var(--text-primary)}
.nav-btn.active{background:var(--blue-bg);color:var(--blue)}
header{background:var(--bg-primary);border-bottom:0.5px solid var(--border-light);padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
main{padding:18px 22px;max-width:1100px;margin:0 auto}
.toast{position:fixed;top:18px;right:18px;z-index:999;background:var(--green-bg);border:0.5px solid var(--green);border-radius:10px;padding:13px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,0.12);max-width:380px;animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.bar-wrap{display:flex;height:22px;border-radius:5px;overflow:hidden;background:var(--bg-secondary)}
.bar-seg{display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:500;transition:width .3s}
</style>

  4:{ativa:true,salas:[{id:'s4a',nome:'Sala 1 – Urologia',tipo:'convencional',ativa:true},{id:'s4b',nome:'Sala 2 – Urologia',tipo:'vlp',ativa:true}],ass:[{id:'a6',nome:'Dra. Cláudia Torres',max:4,salas:['s4a','s4b'],ini:'07:00',dur:90}]},
  5:{ativa:true,salas:[{id:'s5a',nome:'Sala Endoscopia',tipo:'rtu',ativa:true}],ass:[{id:'a7',nome:'Dr. Marcos Vieira',max:3,salas:['s5a'],ini:'07:00',dur:60}]},

};

function todayStr(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`}
function dStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function fmt(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`}
function calcAge(dob){if(!dob)return'';const b=new Date(dob),t=new Date();let a=t.getFullYear()-b.getFullYear();if(t<new Date(t.getFullYear(),b.getMonth(),b.getDate()))a--;return`${a} anos`}
function addMin(hhmm,mn){const[hh,m]=hhmm.split(':').map(Number);const tt=hh*60+m+mn;return`${String(Math.floor(tt/60)).padStart(2,'0')}:${String(tt%60).padStart(2,'0')}`}
function salaById(week,id){return Object.values(week).flatMap(d=>d.salas).find(s=>s.id===id)}
function tipoCir(week,p){const s=salaById(week,p.sala);return s?s.tipo:null}
function genSlots(ds,patients,week){
  const dow=new Date(ds).getDay(),wc=week[dow];
  if(!wc||!wc.ativa||FERIADOS[ds])return[];
  const out=[];
  wc.ass.forEach(a=>{
    wc.salas.filter(s=>a.salas.includes(s.id)&&s.ativa).forEach(sala=>{
      const ocup=patients.filter(p=>p.dataCir===ds&&p.sala===sala.id&&p.status==='agendado').map(p=>p.hora);
      let hora=a.ini||'07:00';
      for(let i=0;i<a.max;i++){out.push({sala,ass:a,hora,livre:!ocup.includes(hora)});hora=addMin(hora,a.dur||90)}
    });
  });
  return out;
}

// Carregar do localStorage ou usar seed
function loadState(){
  try{const s=localStorage.getItem('cir_state');if(s){const p=JSON.parse(s);return{...INIT_STATE_BASE,patients:p.patients||makeSeed(),week:p.week||WEEK_INIT};}}catch(e){}
  return null;
}
function saveState(state){
  try{localStorage.setItem('cir_state',JSON.stringify({patients:state.patients,week:state.week}));}catch(e){}
}

const INIT_STATE_BASE={view:'dashboard',tab:'oncologia',calMes:new Date().getMonth(),calAno:new Date().getFullYear(),repMes:new Date().getMonth(),repAno:new Date().getFullYear(),selDate:null,selDow:1,fStatus:'todos',fPrio:'todas',busca:'',stPop:null,modalPac:false,editPac:null,modalAviso:false,avisoPac:null,agendando:null,agStep:null,agDate:null,agSlot:null,toast:null,saved:false};
const INIT={...INIT_STATE_BASE,patients:makeSeed(),week:WEEK_INIT};

function red(s,a){
  let ns=s;
  switch(a.t){
    case 'VIEW':ns={...s,view:a.v,stPop:null};break;
    case 'TAB':ns={...s,tab:a.v,fStatus:'todos',fPrio:'todas',busca:''};break;
    case 'F_STATUS':ns={...s,fStatus:a.v};break;
    case 'F_PRIO':ns={...s,fPrio:a.v};break;
    case 'BUSCA':ns={...s,busca:a.v};break;
    case 'POP':ns={...s,stPop:a.id===s.stPop?null:a.id};break;
    case 'CLOSE_POP':ns={...s,stPop:null};break;
    case 'OPEN_PAC':ns={...s,modalPac:true,editPac:a.p||null};break;
    case 'CLOSE_PAC':ns={...s,modalPac:false,editPac:null};break;
    case 'SAVE_PAC':{
      const ps=s.patients;
      if(a.p.id){ns={...s,patients:ps.map(p=>p.id===a.p.id?a.p:p),modalPac:false,editPac:null};}
      else{ns={...s,patients:[...ps,{...a.p,id:'p'+Date.now(),incl:todayStr(),assId:'',assNome:'',hist:[{d:todayStr(),de:null,para:'pendente'}],aviso:newAviso(a.p.proc)}],modalPac:false,editPac:null};}
      break;
    }
    case 'DEL_PAC':ns={...s,patients:s.patients.filter(p=>p.id!==a.id)};break;
    case 'OPEN_AVISO':ns={...s,modalAviso:true,avisoPac:a.p};break;
    case 'CLOSE_AVISO':ns={...s,modalAviso:false,avisoPac:null};break;
    case 'SAVE_AVISO':ns={...s,patients:s.patients.map(p=>p.id===a.id?{...p,aviso:a.aviso}:p),modalAviso:false,avisoPac:null};break;
    case 'SET_STATUS':{
      if(a.s==='agendado'){const pac=s.patients.find(p=>p.id===a.id);ns={...s,agendando:pac,agStep:'cal',agDate:null,agSlot:null,view:'calendar',stPop:null,selDate:null,calMes:new Date().getMonth(),calAno:new Date().getFullYear()};break;}
      ns={...s,stPop:null,patients:s.patients.map(p=>{if(p.id!==a.id)return p;const clr=a.s==='pendente'||a.s==='cancelado';return{...p,status:a.s,hist:[...(p.hist||[]),{d:todayStr(),de:p.status,para:a.s}],dataCir:clr?'':p.dataCir,sala:clr?'':p.sala,hora:clr?'':p.hora,assId:clr?'':p.assId,assNome:clr?'':p.assNome};})};break;
    }
    case 'CANCEL_AG':ns={...s,agendando:null,agStep:null,agDate:null,agSlot:null};break;
